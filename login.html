<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Only You ❤️</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --gold: #e5c185;
            --deep-overlay: rgba(10, 8, 5, 0.7);
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(var(--deep-overlay), var(--deep-overlay)),
                url('https://images.pexels.com/photos/13604515/pexels-photo-13604515.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Montserrat', sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            filter: blur(1px);
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.1;
                transform: translateY(0) scale(0.8);
            }
            50% {
                opacity: 0.4;
                transform: translateY(-20px) scale(1.2);
            }
        }

        .container {
            z-index: 10;
            width: 85%;
            max-width: 400px;
            padding: 60px 40px;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 32px;
            font-weight: 400;
            font-style: italic;
            letter-spacing: -1px;
            margin: 10px 0 15px 0;
            color: #fff;
        }

        .sub-header {
            font-family: 'Bodoni Moda', serif;
            font-size: 12px;
            color: var(--gold);
            letter-spacing: 2px;
            margin-top: 15px;
            margin-bottom: 40px;
            opacity: 0.8;
            font-weight: 400;
            line-height: 1.6;
            display: block;
        }

        .clue-list {
            text-align: left;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
            margin-bottom: 35px;
            font-weight: 400;
        }

        .clue-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-family: 'Bodoni Moda', serif;
            font-size: 12px;
            padding: 10px 0;
            width: 90%;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            transition: all 0.5s ease;
        }

        input:focus {
            border-color: var(--gold);
            background: rgba(0, 0, 0, 0.4);
        }

        /* Password Toggle Icon Style */
        .toggle-btn {
            position: absolute;
            right: 8%;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            transition: 0.3s;
        }

        .toggle-btn:hover {
            color: var(--gold);
        }

        .unlock-btn {
            background: white;
            border: 1px solid white;
            color: #000;
            padding: 9px 0;
            width: 90%;
            font-family: 'Bodoni Moda', serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .unlock-btn:hover {
            background: var(--gold);
            border-color: var(--gold);
            color: white;
            letter-spacing: 6px;
        }

        #error-msg {
            margin-top: 20px;
            font-size: 12px;
            color: var(--gold);
            font-style: italic;
            min-height: 20px;
        }
    </style>
</head>

<body>

    <div id="stars"></div>

    <div class="container">
        <h2>Only One Heart...</h2>

        <span class="sub-header">
            Solve the clues below to reveal the password<br>
            — no spaces allowed —
        </span>

        <div class="clue-list">
            <div class="clue-item">1. 3rd letter of your sis whose bday is today <br> (April 2)</div>
            <div class="clue-item">2. 1st letter of mom's birth month</div>
            <div class="clue-item">3. 1st letter of dad's name</div>
            <div class="clue-item">4. The name we often called both of us <br> (clue: an animal)</div>
            <div class="clue-item">5. Your birth year</div>
        </div>

        <div class="input-wrapper">
            <input type="password" id="code" placeholder="••••••••••••">
            <i class="fa-regular fa-eye toggle-btn" id="toggleIcon" onclick="togglePassword()"></i>
        </div>

        <button class="unlock-btn" onclick="checkCode()">Unlock My Heart</button>
        <p id="error-msg"></p>
    </div>

    <script>
        const stars = document.getElementById('stars');
        for (let i = 0; i < 40; i++) {
            let star = document.createElement("div");
            star.className = "star";
            let size = Math.random() * 3;
            star.style.width = size + "px";
            star.style.height = size + "px";
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "vh";
            star.style.setProperty('--duration', (3 + Math.random() * 5) + "s");
            stars.appendChild(star);
        }

        function togglePassword() {
            const passInput = document.getElementById("code");
            const icon = document.getElementById("toggleIcon");
            if (passInput.type === "password") {
                passInput.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                passInput.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        const correct = ["f", "o", "r", "monkey", "2001"];

        function checkCode() {
            let input = document.getElementById("code").value.toLowerCase();
            const error = document.getElementById("error-msg");

            let parts = [
                input[0],
                input[1],
                input[2],
                input.slice(3, 9),
                input.slice(9)
            ];

            let wrongParts = [];

            if (parts[0] !== correct[0]) wrongParts.push("clue 1");
            if (parts[1] !== correct[1]) wrongParts.push("clue 2");
            if (parts[2] !== correct[2]) wrongParts.push("clue 3");
            if (parts[3] !== correct[3]) wrongParts.push("clue 4");
            if (parts[4] !== correct[4]) wrongParts.push("clue 5");

            if (input === "formonkey2001") {
                document.body.style.transition = "opacity 1.5s";
                document.body.style.opacity = "0";
                setTimeout(() => { window.location.href = "welcome.html"; }, 1500);
            } else if (input === "") {
                error.innerText = "The door is locked, my sunshine... 😌";
            } else {
                error.innerText = "Check: " + wrongParts.join(", ");
            }
        }
    </script>

</body>

</html>
