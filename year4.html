<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Us, Stronger Than Ever 💖</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@400;700&display=swap"
    rel="stylesheet">

  <style>
    /* 🌌 BACKGROUND & BASE */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
        url('https://images.pexels.com/photos/10297851/pexels-photo-10297851.jpeg') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      overflow: hidden;
      color: #fff;
    }

    /* ✨ HEADER */
    .year-header {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: 10px;
      margin-top: 50px;
      text-transform: uppercase;
    }

    /* 📸 POLAROID CONTAINER */
    .story-wrapper {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      position: relative;
    }

    .polaroid {
      background: #ffffff;
      padding: 15px 15px 35px 15px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
      width: 77%;
      max-width: 320px;
      position: absolute;
      opacity: 0;
      transform: scale(0.9) translateY(30px);
      transition: all 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
      pointer-events: none;
    }

    .polaroid.active {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }

    .polaroid.exit {
      opacity: 0 !important;
      transform: scale(1.1) translateY(-40px) rotate(2deg) !important;
    }

    .polaroid img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    /* 🖋️ CAPTION STYLE */
    .caption {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      padding: 25px 10px 0 10px;
      color: #1a1a1a;
      line-height: 1.4;
      font-weight: 600;
      text-align: center;
    }

    /* 💖 BUTTON AREA */
    .btn-area {
      margin-bottom: 60px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .btn {
      padding: 12px 25px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      background: whitesmoke;
      color: black;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.4s ease;
      margin-bottom: 50px;
    }

    .btn:hover {
      background: white;
      letter-spacing: 5px;
      transform: translateY(-2px);
    }

    .final {
      background: white;
      color: black;
      border: none;
    }
  </style>
</head>

<body>

  <div class="year-header">2024 - 2025</div>

  <div class="story-wrapper" id="story-container">
  </div>

  <div class="btn-area">
    <button class="btn" onclick="nextCard()" id="btn">NEXT</button>
  </div>
  <script>
    const story = [
      { text: "A lot changed… but not my love for you 💖", img: "images/f1.jpg" },
      { text: "There were days… you were in pain… real pain…", img: "images/f2.jpg" },
      { text: "That sudden stomach pain… those hospital days… it hurt me seeing you like that 🥺", img: "images/f3.jpg" },
      { text: "You went through it again… ", img: "images/f4.jpg" },
      { text: "Thank God… you came out of it… safe and okay 💫", img: "images/f5.jpg" },
      { text: "Then life moved again… you joined Numota…", img: "images/f6.jpg" },
      { text: "Some small fights… just for your attention…", img: "images/f7.jpg" },
      { text: "But we always fixed it… because we are us 💖", img: "images/f8.jpg" },
      { text: "Then came our first trip together! Chitharal… Pechiparai… 💖", img: "images/f9.jpg" },
      { text: "You gifted me that black t-shirt… and I loved it moreeeee 💖", img: "images/f10.jpg" },
      { text: "Thirparappu waterfalls… another beautiful memory with you… 💫", img: "images/f11.png" },
      { text: "Thank you for loving even my smallest efforts, like those simple paper gifts 🥺💖", img: "images/f12.jpg" },
      { text: "With others I'm silent... but with you, my mouth never stops! ", img: "images/f13.jpg" },
      { text: "You are my peace… my comfort… my home 💖", img: "images/f14.png" }
    ];

    let index = 0;
    const container = document.getElementById('story-container');
    const btn = document.getElementById('btn');

    function createCard(idx) {
      const card = document.createElement('div');
      card.className = 'polaroid';
      card.innerHTML = `
                <img src="${story[idx].img}" alt="Memory">
                <div class="caption">${story[idx].text}</div>
            `;
      container.appendChild(card);
      return card;
    }

    function nextCard() {
      const currentCard = document.querySelector('.polaroid.active');

      if (currentCard) {
        currentCard.classList.remove('active');
        currentCard.classList.add('exit');
        setTimeout(() => currentCard.remove(), 800);
      }

      index++;

      if (index < story.length) {
        const newCard = createCard(index);
        setTimeout(() => newCard.classList.add('active'), 50);
      }

      if (index === story.length - 1) {
        btn.innerText = "CONTINUE";
        btn.classList.add('final');
        btn.onclick = () => window.location.href = "game4.html";
      }
    }

    // Load first card
    const firstCard = createCard(0);
    setTimeout(() => firstCard.classList.add('active'), 100);
  </script>

</body>

</html>
