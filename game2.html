<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Gallery of Us</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital@0;1&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --gold: #c5a059;
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.15);
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
        url('https://images.pexels.com/photos/27936090/pexels-photo-27936090.jpeg') center/cover no-repeat;
      overflow: hidden;
      color: var(--white);
      transition: filter 0.8s ease;
    }

    /* Blur entire screen when win appears */
    body.blurred #main-content {
      filter: blur(8px);
      pointer-events: none;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-style: italic;
      font-size: 1.8rem;
      margin: 0 0 10px 0;
      letter-spacing: 1px;
    }

    .instruction {
      font-size: 0.85rem;
      font-weight: 300;
      margin-bottom: 20px;
      opacity: 0.9;
      letter-spacing: 0.5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 85px);
      gap: 12px;
      perspective: 1000px;
    }

    .card {
      width: 85px;
      height: 85px;
      cursor: pointer;
      position: relative;
    }

    .inner {
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      border-radius: 4px;
    }

    .card.flipped .inner {
      transform: rotateY(180deg);
    }

    .front,
    .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 4px;
      /* border: 1px solid rgba(255, 255, 255, 0.2); */
    }

    .front {
      background: var(--glass);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Minimalist Heart Icon instead of diamond */
    .front::after {
      content: '♥';
      font-size: 1.2rem;
      color: var(--gold);
      opacity: 0.6;
    }

    .back {
      transform: rotateY(180deg);
      background: #222;
    }

    .back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
    }

    .matched .inner {
      border: 1.5px solid var(--gold);
      box-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
    }

    #msg {
      height: 40px;
      margin-top: 15px;
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-style: italic;
      color: var(--gold);
    }

    /* Win Container - Style preserved from your preference */
    #win {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      border-radius: 5px;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      padding: 15px;
      text-align: center;
      border: 1px solid var(--gold);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
      z-index: 100;
      width: 80%;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 12px 24px;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }

    .btn:hover {
      background: var(--gold);
      color: black;
    }

    @media (max-height: 500px) {
      .grid {
        grid-template-columns: repeat(4, 70px);
      }

      .card {
        width: 70px;
        height: 70px;
      }
    }
  </style>
</head>

<body>

  <div id="main-content" style="display: flex; flex-direction: column; align-items: center;">
    <h2>The Gallery</h2>
    <div class="instruction">Match the  card pairs to reveal our timeline.</div>

    <div class="grid" id="grid"></div>
    <div id="msg"></div>
  </div>

  <div id="win">
    <div style="font-family: 'Playfair Display'; font-size: 1.4rem; margin-bottom: 10px; color: var(--white);">Complete.
    </div>
    <p style="font-size: 0.8rem; margin-bottom: 20px; color: var(--white); opacity: 0.8;">Every moment was worth it.</p>
    <button class="btn" onclick="location.href='year3.html'">Go Next </button>
  </div>
  <script>
    const images = [
      "./images/c1.jpg", "./images/c2.jpg",
      "./images/c3.jpg", "./images/c4.jpg",
      "./images/c5.jpg", "./images/c6.jpg"
    ];

    const texts = {
      "./images/c1.jpg": "You looks cute😅 ",
      "./images/c2.jpg": "The pic of u before we met",
      "./images/c3.jpg": "its me😌.",
      "./images/c4.jpg": "Do you remember this pic 😁.",
      "./images/c5.jpg": "Looking handsome 😚.",
      "./images/c6.jpg": "Once U put this as your whatsap DP"
    };

    let cardsData = [...images, ...images].sort(() => Math.random() - 0.5);
    const grid = document.getElementById("grid");
    const body = document.body;
    let flippedCards = [];
    let matchedCount = 0;

    cardsData.forEach((src) => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
            <div class="inner">
                <div class="front"></div>
                <div class="back"><img src="${src}"></div>
            </div>
        `;
      card.dataset.val = src;
      card.onclick = () => handleFlip(card);
      grid.appendChild(card);
    });

    function handleFlip(card) {
      if (flippedCards.length < 2 && !card.classList.contains('flipped')) {
        card.classList.add('flipped');
        flippedCards.push(card);

        if (flippedCards.length === 2) {
          checkMatch();
        }
      }
    }

    function checkMatch() {
      const [c1, c2] = flippedCards;
      if (c1.dataset.val === c2.dataset.val) {
        c1.classList.add('matched');
        c2.classList.add('matched');
        document.getElementById("msg").innerText = texts[c1.dataset.val] || "A beautiful moment.";
        matchedCount += 2;
        flippedCards = [];
        if (matchedCount === cardsData.length) {
          setTimeout(triggerWin, 600);
        }
      } else {
        setTimeout(() => {
          c1.classList.remove('flipped');
          c2.classList.remove('flipped');
          flippedCards = [];
        }, 800);
      }
    }

    function triggerWin() {
      // Blur the background content
      body.classList.add('blurred');
      // Show the sharp win container
      document.getElementById("win").style.display = "block";
    }
  </script>

</body>

</html>
