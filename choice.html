<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OUR WORLD 🌙</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Tenor+Sans&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --accent-gold: #d8c29d;
            --white: #ffffff;
            --black: #1a1a1a;
            --overlay: rgba(0, 0, 0, 0.65);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(216, 194, 157, 0.3);
        }

        * {
            cursor: none;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(var(--overlay), var(--overlay)),
                url('https://images.pexels.com/photos/3473541/pexels-photo-3473541.jpeg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', serif;
            color: var(--white);
            transition: opacity 1.5s ease;
        }

        /* ❤️ CUSTOM HEART CURSOR (Now Mobile Friendly) */
        #cursor {
            position: fixed;
            width: 15px;
            height: 15px;
            background: var(--accent-gold);
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 9999;
            filter: drop-shadow(0 0 5px rgba(216, 194, 157, 0.8));
            /* Ensure it starts off-screen */
            left: -100px;
        }

        #cursor::before,
        #cursor::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background: var(--accent-gold);
            border-radius: 50%;
        }

        #cursor::before {
            top: -8px;
            left: 0;
        }

        #cursor::after {
            left: 8px;
            top: 0;
        }

        .sparkle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: var(--accent-gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            animation: fadeOut 0.8s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: scale(0) translateY(-25px);
            }
        }

        .content-wrap {
            z-index: 10;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 400;
            font-style: italic;
            letter-spacing: 1px;
            margin-bottom: 50px;
            line-height: 1.2;
            padding: 0 20px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        button {
            padding: 16px 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 11px;
            font-family: 'Tenor Sans', sans-serif;
            color: var(--white);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 0px;
            width: 220px;
            position: relative;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }

        button:hover {
            border-color: var(--accent-gold);
            background: rgba(216, 194, 157, 0.15);
            letter-spacing: 6px;
            transform: translateY(-2px);
        }

        .yes {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        #msg {
            margin-top: 50px;
            font-family: 'Tenor Sans', sans-serif;
            font-size: 13px;
            font-style: italic;
            letter-spacing: 1px;
            color: var(--accent-gold);
            opacity: 0;
            height: 20px;
            transition: opacity 0.4s ease;
            padding: 0 20px;
        }

        .show-msg {
            opacity: 1 !important;
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            * {
                cursor: auto;
            }

            #cursor {
                width: 12px;
                height: 12px;
            }

            #cursor::before,
            #cursor::after {
                width: 12px;
                height: 12px;
            }

            #cursor::before {
                top: -6px;
            }

            #cursor::after {
                left: 6px;
            }
        }
    </style>
</head>

<body>
    <div id="cursor"></div>

    <div class="content-wrap">
        <h1>Are you ready to step <br>into our world?</h1>
        <div class="btn-group">
            <button class="yes" onclick="goLogin()">I am ready ❤️</button>
            <button class="no" id="noBtn">Not yet 😏</button>
        </div>
        <p id="msg"></p>
    </div>

    <script>
        // --- 1. Enhanced Cursor & Sparkle Logic ---
        const cursor = document.getElementById('cursor');

        const moveHeart = (x, y) => {
            cursor.style.left = x + 'px';
            cursor.style.top = y + 'px';
            createSparkle(x, y);
        };

        // Desktop
        document.addEventListener('mousemove', (e) => {
            moveHeart(e.clientX, e.clientY);
        });

        // Mobile Touch
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            moveHeart(touch.clientX, touch.clientY);
        }, { passive: true });

        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            moveHeart(touch.clientX, touch.clientY);
        }, { passive: true });

        function createSparkle(x, y) {
            if (Math.random() > 0.75) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = x + 'px';
                s.style.top = y + 'px';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }
        }

        // --- 2. Romantic Rejection Logic ---
        const noBtn = document.getElementById("noBtn");
        const msg = document.getElementById("msg");

        const romanticRejections = [
            "Nice try, but you're stuck with me. ✨",
            "Error 404: 'No' not found in our world.",
            "I think you meant to click the other one... 😉",
            "You're too cute to say no.",
            "The stars have already decided. It's a yes.",
            "Close, but no escape! ❤️",
            "I'll wait until you change your mind...",
            "Are you playing hard to get? It's working."
        ];

        let msgIndex = 0;

        const teleportButton = () => {
            const padding = 60;
            const bWidth = noBtn.offsetWidth;
            const bHeight = noBtn.offsetHeight;

            const newX = Math.random() * (window.innerWidth - bWidth - padding * 2) + padding;
            const newY = Math.random() * (window.innerHeight - bHeight - padding * 2) + padding;

            noBtn.style.position = "fixed";
            noBtn.style.left = newX + "px";
            noBtn.style.top = newY + "px";
            noBtn.style.margin = "0";

            // Cycle through messages
            msg.classList.remove('show-msg');
            setTimeout(() => {
                msg.innerText = romanticRejections[msgIndex];
                msg.classList.add('show-msg');
                msgIndex = (msgIndex + 1) % romanticRejections.length;
            }, 150);
        };

        noBtn.addEventListener("mouseover", teleportButton);
        noBtn.addEventListener("touchstart", (e) => {
            e.preventDefault(); // Prevents accidental clicking on mobile
            teleportButton();
        });

        // --- 3. Transition to Login ---
        function goLogin() {
            document.body.style.opacity = "0";
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        }
    </script>
</body>

</html>
