<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Beginning ☀️</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap"
    rel="stylesheet">

  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background-color: #000;
    }

    /* 🌅 THE PERFECT ORANGE SUNRISE */
    .sky-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      animation: skyTransition 8s forwards ease-in-out;
    }

    @keyframes skyTransition {
      0% {
        background: #000;
      }

      50% {
        background: #ffb347;
      }

      100% {
        background: transparent;
      }
    }

    /* 🖼️ BLURRED BACKGROUND IMAGE */
    .background-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.2)),
        url('https://images.pexels.com/photos/32011936/pexels-photo-32011936.jpeg') no-repeat center center;
      background-size: cover;
      filter: blur(6px);
      transform: scale(1.1);
      z-index: 1;
      opacity: 0;
      animation: revealImg 3s forwards;
      animation-delay: 6s;
    }

    @keyframes revealImg {
      to {
        opacity: 1;
      }
    }

    /* ☀️ SUN ANIMATION */
    .sun {
      position: absolute;
      bottom: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 90px;
      background: radial-gradient(circle, #fff, #ffd700, #ff8c00);
      border-radius: 50%;
      box-shadow: 0 0 80px rgba(255, 165, 0, 0.8);
      z-index: 6;
      animation: riseToCorner 8s forwards ease-in-out;
    }

    @keyframes riseToCorner {
      0% {
        bottom: -120px;
        left: 50%;
        opacity: 0;
      }

      30% {
        opacity: 1;
      }

      60% {
        bottom: 40%;
        left: 50%;
        transform: translateX(-50%) scale(1.2);
      }

      100% {
        bottom: 85%;
        left: 90%;
        opacity: 0;
        transform: translateX(-50%) scale(0.4);
      }
    }

    .content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 10%;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 7vw, 36px);
      color: #fff;
      margin-bottom: 25px;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
      opacity: 0;
      animation: slideUp 1s forwards;
      animation-delay: 8s;
    }

    .sub-text-line {
      display: block;
      font-size: clamp(15px, 4.5vw, 18px);
      color: #f0f0f0;
      margin: 10px 0;
      opacity: 0;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
      animation: slideUp 1s forwards;
    }

    .line-1 {
      animation-delay: 9s;
    }

    .line-2 {
      animation-delay: 10.5s;
    }

    .line-3 {
      animation-delay: 12s;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ✨ UPDATED CLASSY BUTTON */
    button {
      margin-top: 50px;
      padding: 18px 40px;
      background: rgba(255, 255, 255, 0.15);
      /* Classy glass effect */
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      /* Sharp, modern edges */
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 4px;
      /* Increased spacing for luxury look */
      cursor: pointer;
      backdrop-filter: blur(10px);
      opacity: 0;
      animation: fadeIn 2s forwards;
      animation-delay: 13.5s;
      transition: all 0.5s ease;
    }

    button:hover {
      background: #fff;
      color: #000;
      letter-spacing: 6px;
      /* Elegant hover expansion */
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="background-image"></div>
  <div class="sky-overlay"></div>
  <div class="sun"></div>

  <div class="content">
    <h2>Before that “yes”...<br>there was us 💖</h2>

    <div class="sub">
      <span class="sub-text-line line-1">Maybe I took time… but I finally chose right one</span>
      <span class="sub-text-line line-2">You waited… so patiently for me </span>
      <span class="sub-text-line line-3">I’m really lucky… that you chose to stay with me ☀️</span>
    </div>

    <button onclick="goYear1()">
      Begin Our Story
    </button>
  </div>

  <script>
    function goYear1() {
      window.location.href = "year1.html";
    }
  </script>

</body>

</html>
